<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden;font-family:'Tajawal',sans-serif;transition:background .4s}
#root{min-height:100vh;min-height:100dvh}

/* ══════════════════════════════════════════════
   ✨ 20 ADDITIONS - SPLASH & LOGIN SCREENS ✨
   ══════════════════════════════════════════════ */

/* 1️⃣ SPLASH SCREEN BASE */
#splash{position:fixed;inset:0;background:#06001a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .8s ease;overflow:hidden}
#splash.hide{opacity:0;pointer-events:none}

/* 2️⃣ AURORA BACKGROUND */
.sp-aurora{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.sp-aurora::before{content:'';position:absolute;width:150%;height:150%;top:-25%;left:-25%;background:conic-gradient(from 180deg at 50% 50%,#6c47ff33 0deg,#ff6b6b22 60deg,#06d6a033 120deg,#ffd16622 180deg,#118ab222 240deg,#6c47ff33 360deg);animation:auroraSpin 10s linear infinite}
.sp-aurora::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,transparent 40%,#06001a 100%)}
@keyframes auroraSpin{to{transform:rotate(360deg)}}

/* 3️⃣ FLOATING ORBS */
.sp-orb{position:absolute;border-radius:50%;filter:blur(60px);animation:orbFloat linear infinite}
.sp-orb1{width:300px;height:300px;background:radial-gradient(#6c47ff55,transparent 70%);top:-80px;right:-80px;animation-duration:8s}
.sp-orb2{width:250px;height:250px;background:radial-gradient(#ff6b6b44,transparent 70%);bottom:-60px;left:-60px;animation-duration:10s;animation-delay:-3s}
.sp-orb3{width:180px;height:180px;background:radial-gradient(#06d6a044,transparent 70%);bottom:20%;right:10%;animation-duration:7s;animation-delay:-5s}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.1)}}

/* 4️⃣ TWINKLING STARS */
.sp-stars{position:absolute;inset:0;pointer-events:none}
.sp-star{position:absolute;background:#fff;border-radius:50%;animation:starTwinkle ease-in-out infinite}
@keyframes starTwinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.9;transform:scale(1.8)}}

/* 5️⃣ SHOOTING STARS */
.shoot-star{position:absolute;width:120px;height:2px;background:linear-gradient(90deg,#fff,transparent);border-radius:2px;animation:shootAcross 4s linear infinite;opacity:0}
@keyframes shootAcross{0%{opacity:0;transform:translateX(-150px) translateY(0) rotate(-30deg)}10%{opacity:1}90%{opacity:1}100%{opacity:0;transform:translateX(calc(100vw + 150px)) translateY(-80px) rotate(-30deg)}}

/* 6️⃣ FOOTBALL BOUNCE */
.sp-ball{position:absolute;font-size:40px;animation:ballBounce 3s ease-in-out infinite;filter:drop-shadow(0 8px 15px rgba(0,0,0,.5))}
@keyframes ballBounce{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-40px) rotate(180deg)}}

/* 7️⃣ STADIUM GRASS LINES */
.stadium-lines{position:absolute;bottom:0;left:0;right:0;height:120px;pointer-events:none;overflow:hidden;opacity:.15}
.stadium-lines::before{content:'';position:absolute;bottom:0;left:0;right:0;height:100%;background:repeating-linear-gradient(90deg,transparent,transparent 30px,#06d6a022 30px,#06d6a022 32px)}
.stadium-lines::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:200px;height:100px;border:2px solid #06d6a033;border-radius:50%}

/* 8️⃣ SPLASH CONTENT */
.sp-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 20px}

/* 9️⃣ TROPHY ANIMATION */
.sp-trophy{font-size:30px;animation:trophySpin 4s ease-in-out infinite;margin-bottom:4px;filter:drop-shadow(0 0 10px #ffd16688)}
@keyframes trophySpin{0%,100%{transform:rotate(-10deg) scale(1)}50%{transform:rotate(10deg) scale(1.2)}}

/* 🔟 RAINBOW TITLE */
.sp-icon{font-size:95px;margin-bottom:8px;animation:float 2.5s infinite ease-in-out;filter:drop-shadow(0 0 35px #6c47ffaa)}
.sp-title{font-size:36px;font-weight:800;margin-bottom:4px;font-family:'Baloo 2',sans-serif;letter-spacing:2px;background:linear-gradient(90deg,#a78bfa,#f472b6,#fb923c,#facc15,#4ade80,#38bdf8,#a78bfa);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rainbowShift 3s linear infinite}
@keyframes rainbowShift{0%{background-position:0%}100%{background-position:200%}}

.sp-sub{font-size:13px;color:rgba(255,255,255,.5);font-family:'Tajawal',sans-serif;letter-spacing:3px;margin-bottom:4px}
.sp-by{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:2px;margin-bottom:16px;font-family:'Tajawal'}
.sp-by span{color:#a78bfacc;font-weight:700;letter-spacing:1px}

/* 1️⃣1️⃣ STATS BADGES */
.sp-stats{display:flex;gap:12px;margin-bottom:16px}
.sp-stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px 14px;text-align:center}
.sp-stat-num{font-size:16px;font-weight:800;color:#ffd166;font-family:'Baloo 2'}
.sp-stat-lbl{font-size:10px;color:rgba(255,255,255,.4);font-family:'Tajawal'}

/* 1️⃣2️⃣ LOADING BAR WITH PERCENTAGE */
.sp-bar-wrap{position:relative;margin-bottom:8px}
.sp-bar{width:200px;height:4px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,#6c47ff,#ff6b6b,#06d6a0,#ffd166);border-radius:99px;animation:load 2.5s ease forwards;background-size:300%;animation-name:load,shimmerBar}
@keyframes load{0%{width:0}100%{width:100%}}
@keyframes shimmerBar{0%,100%{background-position:0%}50%{background-position:100%}}
.sp-pct{font-size:11px;color:rgba(255,255,255,.4);font-family:'Baloo 2';margin-top:6px;letter-spacing:1px}

/* 1️⃣3️⃣ FLOATING GAME CARDS */
.float-card{position:absolute;font-size:22px;animation:floatCard linear infinite;opacity:.3;pointer-events:none}
@keyframes floatCard{0%{transform:translateY(110vh) rotate(0deg);opacity:0}10%{opacity:.3}90%{opacity:.3}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}

/* 1️⃣4️⃣ SPARKLES */
.sparkle{position:absolute;pointer-events:none;animation:sparkleAnim ease-in-out infinite}
@keyframes sparkleAnim{0%,100%{transform:scale(0) rotate(0deg);opacity:0}50%{transform:scale(1) rotate(180deg);opacity:1}}

/* 1️⃣5️⃣ WAVE AT BOTTOM */
.sp-wave{position:absolute;bottom:0;left:0;right:0;height:60px;pointer-events:none}
.sp-wave svg{width:100%;height:100%}

/* 1️⃣6️⃣ NEW BADGE */
.new-badge{background:linear-gradient(135deg,#ff6b6b,#ff4444);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:1px;animation:pulse .8s ease-in-out infinite;display:inline-block;margin-right:6px;vertical-align:middle;font-family:'Tajawal'}

/* ── FB LOGIN SCREEN ── */
/* 1️⃣7️⃣ ENHANCED LOGIN SCREEN */
#fb-login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#06001a,#0a0f2e,#06001a);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
#fb-login-screen .orb{position:absolute;border-radius:50%;pointer-events:none;}
#fb-login-screen .orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(108,71,255,.4),transparent 70%);top:-100px;right:-100px;animation:orbFloat 8s ease-in-out infinite;}
#fb-login-screen .orb2{width:320px;height:320px;background:radial-gradient(circle,rgba(255,107,107,.3),transparent 70%);bottom:-80px;left:-80px;animation:orbFloat 10s ease-in-out infinite;animation-delay:-4s;}
#fb-login-screen .orb3{width:200px;height:200px;background:radial-gradient(circle,rgba(6,214,160,.25),transparent 70%);bottom:30%;right:5%;animation:orbFloat 7s ease-in-out infinite;animation-delay:-2s;}

/* 1️⃣8️⃣ ONLINE INDICATOR */
.online-indicator{display:flex;align-items:center;gap:6px;margin-bottom:12px;background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.2);border-radius:20px;padding:4px 12px;font-size:11px;color:#06d6a0;font-family:'Tajawal'}
.online-dot{width:7px;height:7px;background:#06d6a0;border-radius:50%;animation:blink 1.2s ease-in-out infinite;box-shadow:0 0 8px #06d6a0}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* 1️⃣9️⃣ STAR RATING */
.star-rating{display:flex;gap:2px;justify-content:center;margin:6px 0;font-size:14px}

/* 2️⃣0️⃣ ENHANCED CARD */
.fb-card{position:relative;z-index:2;width:320px;background:linear-gradient(160deg,#0f1a35,#0a1020);border:1px solid rgba(201,168,76,.3);border-radius:28px;padding:2.4rem 2rem;text-align:center;box-shadow:0 0 60px rgba(201,168,76,.15),0 25px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(201,168,76,.2);animation:pop .7s cubic-bezier(.16,1,.3,1) both;}
.fb-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:2px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);border-radius:2px;}
.fb-card::after{content:'';position:absolute;inset:0;border-radius:28px;background:linear-gradient(160deg,rgba(255,255,255,.03),transparent 50%);pointer-events:none}
.fb-moon{font-size:3.2rem;animation:float 3s ease-in-out infinite;display:block;margin-bottom:.4rem;filter:drop-shadow(0 0 15px rgba(201,168,76,.6))}
.fb-title{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#f0d080,#c9a84c,#f0d080);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rainbowShift 4s linear infinite}
.fb-sub{font-size:.82rem;color:rgba(201,168,76,.6);letter-spacing:4px;margin-top:3px;font-family:'Tajawal';}
.fb-divider{display:flex;align-items:center;gap:10px;margin:1.2rem 0;}
.fb-divider span:not(.fb-di){flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.35),transparent);}
.fb-di{color:#c9a84c;font-size:.85rem;opacity:.7;}
.fb-welcome{font-size:.95rem;color:rgba(255,255,255,.65);font-family:'Tajawal';margin-bottom:1.2rem;min-height:1.3rem;}
#fb-user-photo{width:88px;height:88px;border-radius:50%;border:3px solid #c9a84c;display:none;margin:0 auto .8rem;box-shadow:0 0 30px rgba(201,168,76,.5),0 0 0 6px rgba(201,168,76,.1);}
#fb-login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 18px;background:linear-gradient(135deg,#1877f2,#1254b5);color:#fff;border:none;border-radius:13px;cursor:pointer;font-size:.95rem;font-family:'Tajawal';font-weight:700;transition:all .3s;box-shadow:0 4px 24px rgba(24,119,242,.5);position:relative;overflow:hidden;}
#fb-login-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none;}
#fb-login-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(24,119,242,.65);}
#fb-login-btn:disabled{opacity:.5;cursor:not-allowed;}
#fb-enter-btn{display:none;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 18px;background:linear-gradient(135deg,#c9a84c,#a07830);color:#0a0f1e;border:none;border-radius:13px;cursor:pointer;font-size:1rem;font-family:'Tajawal';font-weight:800;letter-spacing:1px;transition:all .3s;box-shadow:0 4px 24px rgba(201,168,76,.5);animation:pulse 2s ease-in-out infinite;}
#fb-enter-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,168,76,.65);}
#fb-guest-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 18px;background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.15);border-radius:13px;cursor:pointer;font-size:.88rem;font-family:'Tajawal';font-weight:600;transition:all .3s;margin-top:8px;}
#fb-guest-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.3);}
.guest-note{font-size:.72rem;color:rgba(255,255,255,.25);font-family:'Tajawal';margin-top:5px;}

/* global animations */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.fade-in{animation:fadeIn .4s ease forwards}
.pop-in{animation:pop .35s ease forwards}
.slide-up{animation:slideUp .4s ease forwards}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none;z-index:9998}

/* ── ANIMATED PAGE BACKGROUND ── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 600px 400px at 10% 20%,rgba(108,71,255,.06) 0%,transparent 70%),
    radial-gradient(ellipse 500px 350px at 90% 80%,rgba(255,107,107,.05) 0%,transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 50%,rgba(6,214,160,.03) 0%,transparent 70%);
  animation:bgShift 15s ease-in-out infinite alternate}
@keyframes bgShift{
  0%{background-position:0% 0%,100% 100%,50% 50%}
  100%{background-position:20% 30%,70% 60%,40% 70%}
}

/* ── GLASSMORPHISM UTILITIES ── */
.glass{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.13);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.glass-card{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:0 8px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.12);
}
.glass-btn{
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 4px 16px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.15);
}
/* animated mesh for home body */
@keyframes meshMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.home-mesh{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 700px 500px at 10% 15%,rgba(108,71,255,.09) 0%,transparent 70%),
    radial-gradient(ellipse 600px 400px at 85% 70%,rgba(255,107,107,.06) 0%,transparent 70%),
    radial-gradient(ellipse 500px 350px at 50% 90%,rgba(6,214,160,.05) 0%,transparent 70%),
    radial-gradient(ellipse 400px 300px at 75% 10%,rgba(255,209,102,.04) 0%,transparent 70%);
  animation:meshMove 20s ease infinite;
}

/* ── HOME HERO SCENERY ── */
.hero-scene{position:relative;overflow:hidden;border-radius:24px;margin-bottom:16px;min-height:160px;display:flex;align-items:center;justify-content:center}
.hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#0a0020 0%,#160a3a 40%,#0f1e4a 70%,#061428 100%)}
.hero-mountains{position:absolute;bottom:0;left:0;right:0;height:100px}
.hero-stars-layer{position:absolute;inset:0;overflow:hidden}
.hero-glow{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:200px;height:80px;background:radial-gradient(ellipse,#6c47ff55 0%,transparent 70%);filter:blur(20px)}
.hero-title-wrap{position:relative;z-index:2;text-align:center;padding:28px 20px 20px}
.hero-greeting{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-family:'Tajawal'}
.hero-name{font-size:28px;font-weight:800;font-family:'Baloo 2';background:linear-gradient(135deg,#fff 0%,#a78bfa 50%,#f472b6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;line-height:1.2}
.hero-tagline{font-size:12px;color:rgba(255,255,255,.35);margin-top:4px;font-family:'Tajawal';letter-spacing:1px}

/* mountain SVG style */
.mtn-back{fill:#1a1040;opacity:.9}
.mtn-mid{fill:#0f2060;opacity:.9}
.mtn-front{fill:#070d30}
.mtn-snow{fill:#fff;opacity:.7}

/* glowing orbs in hero */
.h-orb{position:absolute;border-radius:50%;filter:blur(40px);animation:orbFloat 6s ease-in-out infinite}
.h-orb1{width:120px;height:120px;background:radial-gradient(#6c47ff55,transparent 70%);top:-20px;right:10%;animation-delay:0s}
.h-orb2{width:100px;height:100px;background:radial-gradient(#ff6b6b44,transparent 70%);top:10px;left:5%;animation-delay:-2s}
.h-orb3{width:80px;height:80px;background:radial-gradient(#06d6a033,transparent 70%);bottom:20px;right:30%;animation-delay:-4s}

/* ── GLASSMORPHISM SYSTEM ── */
:root{
  --glass-bg:rgba(255,255,255,.07);
  --glass-border:rgba(255,255,255,.13);
  --glass-blur:blur(18px);
  --glass-shadow:0 8px 32px rgba(0,0,0,.35);
  --glass-shine:inset 0 1px 0 rgba(255,255,255,.18);
}
.glass{
  background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1.5px solid var(--glass-border);
  box-shadow:var(--glass-shadow),var(--glass-shine);
}
.glass-card{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1.5px solid rgba(255,255,255,.12);
  box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.15);
  border-radius:20px;
}

/* animated mesh background for home */
.home-mesh-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.home-mesh-bg::before{
  content:'';position:absolute;inset:-60%;
  background:
    radial-gradient(ellipse 700px 500px at 20% 15%,rgba(108,71,255,.18) 0%,transparent 60%),
    radial-gradient(ellipse 600px 400px at 80% 85%,rgba(255,107,107,.12) 0%,transparent 60%),
    radial-gradient(ellipse 500px 350px at 60% 40%,rgba(6,214,160,.08) 0%,transparent 60%),
    radial-gradient(ellipse 400px 300px at 10% 80%,rgba(255,209,102,.06) 0%,transparent 60%);
  animation:meshDrift 20s ease-in-out infinite alternate;
}
@keyframes meshDrift{
  0%{transform:translate(0,0) scale(1)}
  33%{transform:translate(3%,2%) scale(1.02)}
  66%{transform:translate(-2%,4%) scale(.98)}
  100%{transform:translate(2%,-3%) scale(1.03)}
}
.home-mesh-bg::after{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 59px,
      rgba(255,255,255,.012) 60px
    ),
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 59px,
      rgba(255,255,255,.012) 60px
    );
}

/* Quick-action glass button */
.qa-btn{
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1.5px solid rgba(255,255,255,.14);
  box-shadow:0 4px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.15);
  border-radius:18px;
  color:#fff;cursor:pointer;
  text-align:center;padding:14px 6px;
  transition:all .2s ease;
  position:relative;overflow:hidden;

function getTodayKey(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function isDailyDone(){return lsGet("wp_daily_"+getTodayKey())==="1";}

function getDailyGame(cats){
  const key=getTodayKey().replace(/-/g,"");
  const seed=parseInt(key);
  const catIdx=seed%cats.length;
  const cat=cats[catIdx];
  const gameIdx=(Math.floor(seed/100))%cat.games.length;
  return{cat,game:cat.games[gameIdx]};
}
function getTimeUntilMidnight(){
  const now=new Date(),midnight=new Date(now);
  midnight.setHours(24,0,0,0);
  const diff=midnight-now;
  return{h:Math.floor(diff/3600000),m:Math.floor((diff%3600000)/60000),s:Math.floor((diff%60000)/1000)};
}

}

function ImageGuessGame({onDone,onBack,profile,onUpdateProfile}){
  const{C}=useTheme();
  const items=useMemo(()=>{
    const a=[...IMAGE_GUESS_ITEMS];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a.slice(0,12);
  },[]);
  const[idx,setIdx]=useState(0);
  const[score,setScore]=useState(0);
  const[streak,setStreak]=useState(0);
  const[maxStr,setMaxStr]=useState(0);
  const[selected,setSelected]=useState(null);
  const[imgLoaded,setImgLoaded]=useState(false);
  const[imgError,setImgError]=useState(false);
  const[eliminated,setEliminated]=useState([]);
  const[hintUsed,setHintUsed]=useState(0);

  const curr=items[idx];
  const coins=profile?profile.coins:0;

  const opts=useMemo(()=>{
    if(!curr)return[];
    const o=[curr.a,...curr.d];
    for(let i=o.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]];}
    return o;
  },[idx]);

  const wrongOpts=useMemo(()=>opts.filter(o=>o!==curr.a),[opts,curr]);

  function useHint(level){
    if(selected)return;
    const costs=[0,50,500,1000];
    const cost=costs[level];
    if(coins<cost){alert(`تحتاج ${cost} عملة لهذا التلميح! 💰`);return;}
    // eliminate up to `level` wrong options total
    const available=wrongOpts.filter(o=>!eliminated.includes(o));
    const needed=level-eliminated.length;
    const toAdd=available.slice(0,needed);
    if(toAdd.length>0)setEliminated(prev=>[...prev,...toAdd]);
    setHintUsed(level);
    if(onUpdateProfile)onUpdateProfile({coins:coins-cost});
    if(level===3){setTimeout(()=>pick(curr.a),350);}
  }

  function pick(opt){
    if(selected)return;
    setSelected(opt);
    const ok=opt===curr.a;
    const ns=ok?streak+1:0;setStreak(ns);setMaxStr(m=>Math.max(m,ns));
    if(ok)setScore(s=>s+1);
  }
  function next(){
    if(idx+1>=items.length){onDone({score,total:items.length,streak:maxStr});return;}
    setIdx(i=>i+1);setSelected(null);setImgLoaded(false);setImgError(false);setEliminated([]);setHintUsed(0);
  }
  if(!curr)return null;

  const HINTS=[
    {level:1,cost:50,icon:"💡",label:"حذف خيار",color:"#ffd166",bg:"rgba(255,209,102,.15)"},
    {level:2,cost:500,icon:"💡💡",label:"حذف خيارين",color:"#a78bfa",bg:"rgba(167,139,250,.15)"},
    {level:3,cost:1000,icon:"🔓",label:"كشف الإجابة",color:"#06d6a0",bg:"rgba(6,214,160,.15)"},
  ];

  return React.createElement('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#0a041a,#1a0a3a)",fontFamily:"Tajawal",direction:"rtl",display:"flex",flexDirection:"column"},className:"fade-in"},
    // Header
    React.createElement('div',{style:{background:"rgba(0,0,0,.5)",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      React.createElement('button',{onClick:onBack,style:{background:"rgba(255,255,255,.12)",border:"none",borderRadius:10,padding:"6px 12px",color:"#fff",cursor:"pointer",fontFamily:"Tajawal",fontSize:12}},"← رجوع"),
      React.createElement('div',{style:{display:"flex",alignItems:"center",gap:8}},
        React.createElement('span',{style:{fontSize:18}},"🖼️"),
        React.createElement('span',{style:{color:"#fff",fontFamily:"Baloo 2",fontWeight:700,fontSize:15}},"خمّن الصورة")
      ),
      React.createElement('span',{style:{color:"#ffd166",fontFamily:"Baloo 2",fontWeight:700,fontSize:13}},`${idx+1}/${items.length} • ✓${score}`)
    ),
    // Progress bar
    React.createElement('div',{style:{height:4,background:"rgba(255,255,255,.1)"}},
      React.createElement('div',{style:{height:"100%",width:Math.round((idx/items.length)*100)+"%",background:"linear-gradient(90deg,#9b59ff,#ffd166)",transition:"width .4s"}})
    ),
    // Category + coins
    React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px"}},
      React.createElement('span',{style:{background:"rgba(155,89,255,.25)",color:"#c4b5fd",border:"1.5px solid rgba(155,89,255,.4)",borderRadius:20,padding:"4px 14px",fontSize:11,fontWeight:700}},"📂 "+curr.cat),
      React.createElement('span',{style:{color:"#ffd166",fontSize:13,fontWeight:700}},`💰 ${coins}`)
    ),
    // Main content
    React.createElement('div',{style:{flex:1,padding:"0 16px 8px",display:"flex",flexDirection:"column"}},
      // Image box
      React.createElement('div',{style:{borderRadius:20,overflow:"hidden",marginBottom:12,position:"relative",background:"rgba(255,255,255,.06)",border:"2px solid rgba(255,255,255,.15)",minHeight:200,display:"flex",alignItems:"center",justifyContent:"center"}},
        !imgLoaded&&!imgError&&React.createElement('div',{style:{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,zIndex:1}},
          React.createElement('div',{style:{fontSize:36}},"🖼️"),
          React.createElement('div',{style:{color:"rgba(255,255,255,.4)",fontSize:12}},"جاري تحميل الصورة...")
        ),

class ErrorBoundary extends Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}

  render(){
    if(this.state.error){
      return React.createElement('div',{style:{fontFamily:"Tajawal,sans-serif",direction:"rtl",padding:32,textAlign:"center",background:"#fff0f0",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},

          this.state.error.message||String(this.state.error)

        React.createElement('button',{onClick:()=>{this.setState({error:null});window.location.reload();},

// ── Level helpers ─────────────────────────────────────────────────────────────
const TOTAL_LEVELS=100;
const Q_PER_LEVEL=10;

function loadCatProgress(catId){
  try{const r=lsGet("wp_lvl_"+catId);return r?JSON.parse(r):{unlockedLevel:1,stars:{}};}
  catch{return{unlockedLevel:1,stars:{}};}
}
function saveCatProgress(catId,data){lsSet("wp_lvl_"+catId,JSON.stringify(data));}

function getLevelItems(cat,levelNum){
  const allQ=[];
  cat.games.forEach(g=>g.items.forEach(it=>{if(it.d)allQ.push(it);}));
  if(allQ.length===0)return[];
  const totalQ=allQ.length;
  // Which cycle (full pass through all questions) are we in?
  const globalStart=(levelNum-1)*Q_PER_LEVEL;
  const cycleNum=Math.floor(globalStart/totalQ);
  const posInCycle=globalStart%totalQ;
  // Shuffle array deterministically per cycle (same cycle = same order, different cycle = different order)
  function shuffleWithSeed(arr,s){
    const a=[...arr];let seed=s;
    for(let i=a.length-1;i>0;i--){seed=(seed*1103515245+12345)&0x7fffffff;const j=seed%(i+1);[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }
  const baseSeed=cat.id.split('').reduce((s,c)=>s+c.charCodeAt(0),0)*137;
  const cycle0=shuffleWithSeed(allQ,baseSeed+cycleNum*999983);
  const cycle1=shuffleWithSeed(allQ,baseSeed+(cycleNum+1)*999983);
  // Pick 10 questions, may spill into next cycle if near end
  const result=[];
  for(let i=0;i<Q_PER_LEVEL;i++){
    const pos=posInCycle+i;
    result.push(pos<totalQ?cycle0[pos]:cycle1[pos-totalQ]);
  }
  return result;
}

function getLevelStars(score,total){
  const pct=Math.round((score/total)*100);
  if(pct===100)return 3;if(pct>=70)return 2;if(pct>=50)return 1;return 0;
}
// Note: requires stars>=2 (70%+) to unlock next level

function LevelStars({count,size=14}){
  return React.createElement('div',{style:{display:"flex",gap:1,justifyContent:"center"}},
    [1,2,3].map(i=>React.createElement('span',{key:i,style:{fontSize:size,filter:i<=count?"none":"grayscale(1) opacity(.25)"}},"⭐"))
  );
}

    {n:2,icon:"💡💡",label:"متوسط",cost:5},

    React.createElement('span',{style:{fontSize:11,color:"#888",marginLeft:4}},"تلميح:"),
    levels.map(l=>{

// ─────────────────────── QUIZ GAME ───────────────────────────────────────────
function QuizGame({game,onDone,profile,onUseHint}){
  const {C}=useTheme();
  const items=useMemo(()=>shuffle(game.items),[]);
  const[idx,setIdx]=useState(0);
  const[score,setScore]=useState(0);
  const[streak,setStreak]=useState(0);
  const[maxStr,setMaxStr]=useState(0);
  const[selected,setSelected]=useState(null);
  const[showNext,setShowNext]=useState(false);
  const[hintLevel,setHintLevel]=useState(0);
  const[eliminated,setEliminated]=useState(new Set());
  const[time,setTime]=useState(60);
  const[timeDead,setTimeDead]=useState(false);
  const[bonus,setBonus]=useState(null); // "+5ث" flash
  const timerRef=useRef();
  const scoreRef=useRef(score);
  const maxStrRef=useRef(maxStr);
  scoreRef.current=score; maxStrRef.current=maxStr;

  useEffect(()=>{
    if(timeDead)return;
    timerRef.current=setInterval(()=>{
      setTime(t=>{
        if(t<=1){
          clearInterval(timerRef.current);
          setTimeDead(true);
          onDone({score:scoreRef.current,total:items.length,streak:maxStrRef.current,type:game.type});
          return 0;
        }
        return t-1;
      });
    },1000);
    return()=>clearInterval(timerRef.current);
  },[timeDead]);

  const curr=items[idx];
  const opts=useMemo(()=>curr?shuffle([curr.a,...curr.d]):[],[curr]);

  function useHint(level){
    if(showNext||hintLevel>=level)return;
    const wrongOpts=opts.map((o,i)=>({o,i})).filter(x=>x.o!==curr.a&&!eliminated.has(x.i));
    if(wrongOpts.length===0)return;
    const pick=wrongOpts[Math.floor(Math.random()*wrongOpts.length)];
    const newSet=new Set(eliminated);newSet.add(pick.i);
    setEliminated(newSet);setHintLevel(level);
    if(onUseHint)onUseHint();
  }

  function answer(opt){
    if(showNext||timeDead)return;
    setSelected(opt);setShowNext(true);
    const correct=opt===curr.a;
    const ns=correct?streak+1:0;
    setStreak(ns);setMaxStr(m=>Math.max(m,ns));
    if(correct){
      setScore(s=>s+1);
      setTime(t=>t+5);
      setBonus("+5ث");
      setTimeout(()=>setBonus(null),900);
      // auto-advance after short delay
      setTimeout(()=>{
        if(idx+1>=items.length){onDone({score:scoreRef.current,total:items.length,streak:maxStrRef.current,type:game.type});return;}
        setIdx(i=>i+1);setSelected(null);setShowNext(false);setHintLevel(0);setEliminated(new Set());
      },700);
    }
  }

  function next(){
    if(idx+1>=items.length){onDone({score,total:items.length,streak:maxStr,type:game.type});return;}
    setIdx(i=>i+1);setSelected(null);setShowNext(false);setHintLevel(0);setEliminated(new Set());
  }

  if(!curr)return null;
  const urgent=time<=10;

  return React.createElement('div',{style:{minHeight:"100vh",background:C.bg,fontFamily:"Tajawal",display:"flex",flexDirection:"column"},className:"fade-in"},
    React.createElement('div',{style:{background:`linear-gradient(135deg,${C.headerStart},${C.headerEnd})`,padding:"16px 20px",position:"relative"}},
      React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        React.createElement('span',{style:{color:"rgba(255,255,255,.7)",fontSize:13}},`سؤال ${idx+1} / ${items.length}`),
        React.createElement('div',{style:{display:"flex",gap:12,alignItems:"center"}},
          // Timer
          React.createElement('div',{style:{display:"flex",alignItems:"center",gap:4,background:urgent?"rgba(255,107,107,.25)":"rgba(255,255,255,.12)",borderRadius:10,padding:"4px 10px",position:"relative"}},
            React.createElement('span',{style:{fontSize:14}},"⏱"),
            React.createElement('span',{style:{fontFamily:"Baloo 2",fontWeight:800,fontSize:15,color:urgent?"#ff6b6b":"#fff",transition:"color .3s"}},time),
            bonus&&React.createElement('span',{style:{
              position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",
              color:"#06d6a0",fontWeight:800,fontSize:13,
              animation:"fadeIn .2s ease",whiteSpace:"nowrap",pointerEvents:"none"
            }},bonus)
          ),
          React.createElement('span',{style:{color:"#ffd166",fontSize:13,fontWeight:700}},`🔥 ${streak}`),
          React.createElement('span',{style:{color:"rgba(255,255,255,.6)",fontSize:13}},`💰 ${profile?profile.coins:0}`)
        )
      ),
      // Timer bar
      React.createElement('div',{style:{height:4,background:"rgba(255,255,255,.1)",borderRadius:99,marginBottom:4}},
        React.createElement('div',{style:{height:"100%",width:`${Math.min(100,(time/60)*100)}%`,background:urgent?"linear-gradient(90deg,#ff6b6b,#ff3d3d)":"linear-gradient(90deg,#6c47ff,#9b59ff)",borderRadius:99,transition:"width 1s linear,background .3s"}})
      ),
      // Progress bar
      React.createElement('div',{style:{height:3,background:"rgba(255,255,255,.07)",borderRadius:99}},
        React.createElement('div',{style:{height:"100%",width:`${Math.round(((idx+1)/items.length)*100)}%`,background:"rgba(255,255,255,.35)",borderRadius:99,transition:"width .4s"}})
      )
    ),
    React.createElement('div',{style:{flex:1,padding:"20px 16px",display:"flex",flexDirection:"column"}},
      React.createElement('div',{style:{background:C.card,borderRadius:20,padding:"24px 20px",marginBottom:16,textAlign:"center",boxShadow:C.cardShadow,flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}},
        React.createElement('div',{style:{fontSize:30,marginBottom:12}},"🎯"),
        React.createElement('p',{style:{fontFamily:"Tajawal",fontWeight:700,color:C.text,fontSize:17,lineHeight:1.6}},curr.q)
      ),
      // Hint bar
      React.createElement(HintBar,{profile,hintLevel,onHint:useHint,disabled:showNext}),
      React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        opts.map((opt,i)=>{
          let bg=C.card,border="2px solid "+C.border,color=C.text,opacity=1;
          if(eliminated.has(i)&&!showNext){opacity=.3;bg=C.bg;color=C.muted;}
          if(showNext){
            if(opt===curr.a){bg="#d4edda";border="2px solid #06d6a0";color="#155724";}
            else if(opt===selected){bg="#f8d7da";border="2px solid #ff6b6b";color="#721c24";}
          }
          return React.createElement('button',{
            key:i,onClick:()=>!showNext&&!eliminated.has(i)&&answer(opt),
            style:{background:bg,border,borderRadius:16,padding:"14px 12px",cursor:(showNext||eliminated.has(i))?"default":"pointer",fontFamily:"Tajawal",fontWeight:600,fontSize:14,color,textAlign:"right",display:"flex",alignItems:"center",gap:8,transition:"all .2s",opacity}
          },
            React.createElement('span',{style:{fontSize:15,minWidth:22,textAlign:"center"}},[showNext&&opt===curr.a?"✅":showNext&&opt===selected?"❌":"🔵"]),
            opt
          );
        })
      ),
      showNext&&selected!==curr.a&&React.createElement('button',{onClick:next,style:{marginTop:12,background:"linear-gradient(135deg,#6c47ff,#9b59ff)",color:"#fff",border:"none",borderRadius:16,padding:"14px",width:"100%",fontFamily:"Tajawal",fontWeight:800,fontSize:16,cursor:"pointer",boxShadow:"0 6px 20px rgba(108,71,255,.3)"}},

  );
}

// ─────────────────────── VS TRANSITION ───────────────────────────────────────
function VSTransition({vsConfig,onReady}){
  const {C}=useTheme();
  const[count,setCount]=useState(3);
  const isP2=vsConfig.p1Result!=null;
  const player=isP2?vsConfig.p2:vsConfig.p1;

    const t=setTimeout(()=>setCount(c=>c-1),900);

  return React.createElement('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e,#c0392b)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Tajawal"}},

    setLastResult(result);

    if(selectedGame&&selectedGame._onLevelDone){

    }
    const pct=Math.round((result.score/result.total)*100);

// 🔥 STREAK SYSTEM
// ══════════════════════════════════════════════════════════════════
function loadStreak(){
  try{const r=lsGet("wp_streak");return r?JSON.parse(r):{count:0,lastDate:"",best:0};}catch{return{count:0,lastDate:"",best:0};}
}
function updateStreak(){
  const today=getTodayKey();
  const s=loadStreak();
  if(s.lastDate===today)return s;
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yKey=`${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,"0")}-${String(yesterday.getDate()).padStart(2,"0")}`;
  const newCount=s.lastDate===yKey?s.count+1:1;
  const ns={count:newCount,lastDate:today,best:Math.max(s.best,newCount)};
  lsSet("wp_streak",JSON.stringify(ns));
  return ns;
}
function getStreakReward(count){
  if(count>=30)return{coins:100,msg:"شهر كامل! 🏆"};
  if(count>=14)return{coins:50,msg:"أسبوعان! 💎"};
  if(count>=7) return{coins:30,msg:"أسبوع كامل! 🔥"};
  if(count>=3) return{coins:10,msg:"3 أيام متتالية!"};
  return{coins:5,msg:"يوم جديد!"};
}

  if(done>0&&done%5===0&&!lsGet(boxKey)){
    lsSet(boxKey,"1");
    const prizes=[
      {icon:"💰",label:"50 عملة",type:"coins",val:50},
      {icon:"⭐",label:"100 XP",type:"xp",val:100},

      {icon:"🏆",label:"200 XP",type:"xp",val:200},

    return prizes[Math.floor(Math.random()*prizes.length)];

  function getTheme(lvl){return themes.find(t=>lvl>=t.min&&lvl<=t.max)||themes[0];}

  return React.createElement('div',{style:{padding:"16px 0 80px",overflowY:"auto"}},
    nodes.map((lvl,ni)=>{
      const t=getTheme(lvl);

// 📅 DAILY CALENDAR SCREEN

function CalendarScreen({profile,onBack}){
  const{C}=useTheme();
  const now=new Date();
  const[viewMonth,setViewMonth]=useState(now.getMonth());
  const[viewYear,setViewYear]=useState(now.getFullYear());

  // Build activity data from localStorage
  const activityData=useMemo(()=>{
    const data={};
    // Check daily challenge completions
    for(let i=0;i<365;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const daily=lsGet("wp_daily_"+key);
      const streak=lsGet("wp_streak");
      if(daily){
        try{const r=JSON.parse(daily);data[key]={pct:Math.round((r.score/r.total)*100),type:"daily"};}catch{}
      }
    }
    // Check streak
    const s=lsGet("wp_streak");
    if(s){try{const sr=JSON.parse(s);if(sr.lastDate)data[sr.lastDate]={...(data[sr.lastDate]||{}),streak:true};}catch{}}
    return data;
  },[]);

  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  const firstDay=(new Date(viewYear,viewMonth,1).getDay()+6)%7; // Mon=0
  const todayKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
  const monthNames=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const dayNames=["إث","ثل","أر","خم","جم","سب","أح"];

  function prevMonth(){if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);}
  function nextMonth(){if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);}

  // Streak info
  const streak=useMemo(()=>{try{return JSON.parse(lsGet("wp_streak")||"{}");}catch{return{count:0,best:0};}});
  const totalPlayed=Object.keys(activityData).length;

  return React.createElement('div',{style:{minHeight:"100vh",background:C.bg,fontFamily:"Tajawal",direction:"rtl"},className:"fade-in"},

        React.createElement('div',null,
          React.createElement('h2',{style:{fontFamily:"Baloo 2",color:"#fff",fontSize:20,margin:"0 0 2px"}},"تقويم التقدم"),
          React.createElement('p',{style:{color:"rgba(255,255,255,.6)",fontSize:12,margin:0}},"تابع نشاطك اليومي")
        )
      ),
      // Stats row
      React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}},
        [
          {icon:"🔥",val:streak.count||0,lab:"streak الحالي"},
          {icon:"🏆",val:streak.best||0,lab:"أطول streak"},
          {icon:"📆",val:totalPlayed,lab:"أيام لعبت"},
        ].map(s=>React.createElement('div',{key:s.lab,style:{background:"rgba(255,255,255,.12)",borderRadius:14,padding:"10px 8px",textAlign:"center"}},
          React.createElement('div',{style:{fontSize:20,marginBottom:2}},[s.icon]),
          React.createElement('div',{style:{fontFamily:"Baloo 2",fontWeight:800,color:"#fff",fontSize:18}},[s.val]),
          React.createElement('div',{style:{fontSize:9,color:"rgba(255,255,255,.6)"}},[s.lab])
        ))
      )
    ),

    React.createElement('div',{style:{padding:"16px"}},
      // Month navigation
      React.createElement('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
        React.createElement('button',{onClick:prevMonth,style:{background:C.card,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer",fontSize:18,color:C.text,boxShadow:C.cardShadow}},"‹"),
        React.createElement('span',{style:{fontFamily:"Baloo 2",fontWeight:700,color:C.text,fontSize:17}},`${monthNames[viewMonth]} ${viewYear}`),
        React.createElement('button',{onClick:nextMonth,style:{background:C.card,border:"none",borderRadius:10,padding:"8px 12px",cursor:"pointer",fontSize:18,color:C.text,boxShadow:C.cardShadow}},"›")
      ),

      // Calendar grid
      React.createElement('div',{style:{background:C.card,borderRadius:20,padding:"14px",boxShadow:C.cardShadow,marginBottom:20}},
        // Day names
        React.createElement('div',{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:8}},
          dayNames.map(d=>React.createElement('div',{key:d,style:{textAlign:"center",fontSize:10,color:C.muted,fontWeight:700,padding:"4px 0"}},[d]))
        ),
        // Days
        React.createElement('div',{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}},
          // Empty cells for first day offset
          [...Array(firstDay)].map((_,i)=>React.createElement('div',{key:"e"+i})),

          [...Array(daysInMonth)].map((_,i)=>{
            const day=i+1;

// ⚡ DOUBLE XP SYSTEM
// ═══════════════════════════════════════════════════════════════
function isDoubleXPActive(){
  try{
    const d=lsGet("wp_double_xp");
    if(!d)return false;
    const {until}=JSON.parse(d);
    return Date.now()<until;
  }catch{return false;}
}
function activateDoubleXP(){
  lsSet("wp_double_xp",JSON.stringify({until:Date.now()+30*60*1000})); // 30 min
}
function getDoubleXPRemaining(){
  try{
    const d=lsGet("wp_double_xp");
    if(!d)return 0;
    const {until}=JSON.parse(d);
    return Math.max(0,Math.ceil((until-Date.now())/60000));
  }catch{return 0;}
}

function DoubleXPBanner({onClose}){
  const [mins,setMins]=useState(getDoubleXPRemaining());
  useEffect(()=>{
    const t=setInterval(()=>{
      const r=getDoubleXPRemaining();
      setMins(r);
      if(r<=0){clearInterval(t);onClose&&onClose();}
    },10000);
    return()=>clearInterval(t);
  },[]);
  if(mins<=0)return null;
  return React.createElement('div',{style:{
    position:"fixed",top:0,left:0,right:0,zIndex:160,
    background:"linear-gradient(135deg,#f7c948,#f7a400)",
    padding:"10px 16px",display:"flex",alignItems:"center",gap:10,
    boxShadow:"0 4px 20px rgba(247,196,72,.5)",
  }},
    React.createElement('span',{style:{fontSize:24}},"⚡"),
    React.createElement('div',{style:{flex:1}},
      React.createElement('div',{style:{fontFamily:"Baloo 2",fontWeight:800,fontSize:15,color:"#1a1a2e"}},"Double XP مفعّل!"),
      React.createElement('div',{style:{fontSize:11,color:"rgba(0,0,0,.6)"}},"باقي "+mins+" دقيقة")
    ),
    React.createElement('button',{onClick:onClose,style:{background:"rgba(0,0,0,.15)",border:"none",borderRadius:8,width:26,height:26,cursor:"pointer",color:"#1a1a2e",fontSize:13}},"✕")
  );
}

function saveLastCat(catId){lsSet("wp_last_cat",catId);}
function loadLastCat(){return lsGet("wp_last_cat")||null;}

// Locked categories: unlock after completing N levels in ANY category
const CAT_LOCKS={
  // first 6 cats always unlocked, rest need levels
};
function isCatUnlocked(catId,allProgress){
  const alwaysOpen=["quran","history","science","sports","geography","food","tech","movies","jordan","football_quiz"];
  if(alwaysOpen.includes(catId))return true;
  // Count total levels done across all cats
  const totalDone=Object.values(allProgress).reduce((sum,p)=>sum+Object.keys(p.stars||{}).filter(k=>p.stars[k]>0).length,0);
  const idx=CATEGORIES.findIndex(c=>c.id===catId);
  const threshold=(idx-alwaysOpen.length+1)*5; // every 5 levels unlocks next
  return totalDone>=threshold;
}
function getLevelsToUnlock(catId,allProgress){
  const alwaysOpen=["quran","history","science","sports","geography","food","tech","movies","jordan","football_quiz"];
  if(alwaysOpen.includes(catId))return 0;
  const totalDone=Object.values(allProgress).reduce((sum,p)=>sum+Object.keys(p.stars||{}).filter(k=>p.stars[k]>0).length,0);
  const idx=CATEGORIES.findIndex(c=>c.id===catId);
  const threshold=(idx-alwaysOpen.length+1)*5;
  return Math.max(0,threshold-totalDone);
}

function FootballGuessGame({mode,difficulty,onDone,onBack}){
  const{C}=useTheme();
  const TOTAL_Q=100;
  const diff=difficulty||1;
  const[idx,setIdx]=useState(0);
  const[score,setScore]=useState(0);
  const[streak,setStreak]=useState(0);
  const[maxStr,setMaxStr]=useState(0);
  const[selected,setSelected]=useState(null);
  const[imgFailed,setImgFailed]=useState(false);
  const allItems=useMemo(()=>{
    const pool=mode==="player"?FOOTBALL_PLAYERS:mode==="club"?FOOTBALL_CLUBS:FOOTBALL_COUNTRIES;
    const q=shuffle(pool).slice(0,Math.min(TOTAL_Q,pool.length));
    return q.map(item=>{
      const wrong=shuffle(pool.filter(x=>x.name!==item.name)).slice(0,3);
      return{item,opts:shuffle([item,...wrong])};
    });
  },[mode]);
  const blurPx=selected?0:Math.round((diff/100)*22);
  const blurStyle={filter:`blur(${blurPx}px)`,transition:"filter .5s ease"};
  const curr=allItems[idx];
  useEffect(()=>{setImgFailed(false);},[idx]);

  function answer(name){
    if(selected)return;
    setSelected(name);
    const ok=name===curr.item.name;
    const ns=ok?streak+1:0;
    setStreak(ns);setMaxStr(m=>Math.max(m,ns));
    if(ok)setScore(s=>s+1);
  }
  function next(){
    if(idx+1>=TOTAL_Q){onDone({score,total:TOTAL_Q,streak:maxStr});return;}
    setIdx(i=>i+1);setSelected(null);
  }

  const MI={
    player:{title:"خمّن اللاعب",icon:"⚽",gradA:"#1b4332",gradB:"#2d6a4f"},
    club:  {title:"خمّن النادي",icon:"🛡️",gradA:"#03045e",gradB:"#0077b6"},
    country:{title:"خمّن الدولة",icon:"🌍",gradA:"#3a2100",gradB:"#b87d00"},
  }[mode];

  if(!curr)return null;

  return React.createElement('div',{style:{minHeight:"100vh",background:C.bg,fontFamily:"Tajawal",display:"flex",flexDirection:"column"},className:"fade-in"},
    // Header
    React.createElement('div',{style:{background:`linear-gradient(135deg,${MI.gradA},${MI.gradB})`,padding:"14px 16px"}},
      React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        React.createElement('button',{onClick:onBack,style:{background:"rgba(255,255,255,.2)",border:"none",borderRadius:11,padding:"7px 13px",color:"#fff",cursor:"pointer",fontFamily:"Tajawal",fontSize:13}},"← رجوع"),
        React.createElement('span',{style:{color:"rgba(255,255,255,.85)",fontSize:14,fontWeight:700,fontFamily:"Baloo 2"}},`${MI.icon} ${MI.title}`),
        React.createElement('span',{style:{color:"rgba(255,255,255,.7)",fontSize:13}},`${idx+1}/${TOTAL_Q}`)
      ),
      React.createElement('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
        React.createElement('span',{style:{color:"rgba(255,255,255,.7)",fontSize:12}},`✅ ${score} صح`),
        React.createElement('span',{style:{color:"rgba(255,255,255,.7)",fontSize:12}},`🎚️ ${diff}`),
        React.createElement('span',{style:{color:"#ffd166",fontSize:12,fontWeight:700}},`🔥 ${streak}`)
      ),
      React.createElement('div',{style:{height:4,background:"rgba(255,255,255,.2)",borderRadius:99}},
        React.createElement('div',{style:{height:"100%",width:`${Math.round((idx/TOTAL_Q)*100)}%`,background:"rgba(255,255,255,.85)",borderRadius:99,transition:"width .4s"}})
      )
    ),
    // Content
    React.createElement('div',{style:{flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:14}},
      // Image / Flag card
      React.createElement('div',{style:{background:C.card,borderRadius:24,padding:16,textAlign:"center",boxShadow:C.cardShadow,flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",minHeight:180,position:"relative"}},
        mode==="country"
          ?React.createElement('div',{style:{fontSize:110,lineHeight:1,filter:`blur(${blurPx}px)`,transition:"filter .5s ease",userSelect:"none"}},curr.item.flag)
          :(imgFailed
            ?React.createElement('div',null,
              React.createElement('div',{style:{fontSize:72,marginBottom:8,...blurStyle}},curr.item.emoji||"❓"),
              React.createElement('div',{style:{color:C.muted,fontSize:12}},"صورة غير متوفرة")
            )
            :React.createElement('img',{
              src:curr.item.img,
              onError:()=>setImgFailed(true),
              alt:"?",
              style:{maxWidth:"100%",maxHeight:200,objectFit:"contain",borderRadius:16,display:"block",margin:"0 auto",...blurStyle}
            })
          ),
        React.createElement('div',{style:{marginTop:10,color:C.muted,fontSize:13,fontWeight:700}},
          mode==="player"?"🤔 من هذا اللاعب؟":mode==="club"?"🤔 ما هذا النادي؟":"🤔 علم أي دولة؟"
        )
      ),
      // Options grid
      React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        curr.opts.map(opt=>{
          let bg=C.card,border=`2px solid ${C.border}`,color=C.text;
          if(selected){
            if(opt.name===curr.item.name){bg="#d4edda";border="2px solid #06d6a0";color="#155724";}
            else if(opt.name===selected){bg="#f8d7da";border="2px solid #ff6b6b";color="#721c24";}
          }
          return React.createElement('button',{
            key:opt.name,onClick:()=>!selected&&answer(opt.name),
            style:{background:bg,border,borderRadius:16,padding:"14px 10px",cursor:selected?"default":"pointer",fontFamily:"Tajawal",fontWeight:700,fontSize:14,color,textAlign:"center",transition:"all .2s",minHeight:52}
          },
            mode==="country"?`${opt.flag} ${opt.name}`:opt.name
          );
        })
      ),
      // Feedback & Next
      selected&&React.createElement('div',{style:{background:selected===curr.item.name?"#d4edda":"#f8d7da",borderRadius:14,padding:"10px 16px",textAlign:"center",fontWeight:700,fontSize:14,color:selected===curr.item.name?"#155724":"#721c24"}},
        selected===curr.item.name?"✅ إجابة صحيحة! 🎉":`❌ الإجابة الصحيحة: ${curr.item.name}`
      ),
      selected&&React.createElement('button',{onClick:next,style:{background:"linear-gradient(135deg,#6c47ff,#9b59ff)",color:"#fff",border:"none",borderRadius:16,padding:"14px",width:"100%",fontFamily:"Tajawal",fontWeight:800,fontSize:16,cursor:"pointer",boxShadow:"0 6px 20px rgba(108,71,255,.3)"}},
        idx+1>=TOTAL_Q?"🏁 انتهت اللعبة!":"التالي →"
      )
    )
  );
}

function KidsGame({onBack}){
  const{C}=useTheme();
  const[qs]=useState(()=>{
    const arr=[...KIDS_QUESTIONS];
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    return arr.slice(0,100);
  });
  const[idx,setIdx]=useState(0);
  const[score,setScore]=useState(0);
  const[sel,setSel]=useState(null);
  const[done,setDone]=useState(false);
  const[streak,setStreak]=useState(0);
  const curr=qs[idx];
  const shuffledOpts=useMemo(()=>{
    if(!curr)return[];
    const arr=[...curr.opts];
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    return arr;
  },[idx]);
  function pick(opt){
    if(sel)return;
    setSel(opt);
    if(opt===curr.a){setScore(s=>s+1);setStreak(s=>s+1);}
    else setStreak(0);
  }
  function next(){
    if(idx+1>=qs.length){setDone(true);return;}
    setIdx(i=>i+1);setSel(null);
  }
  if(done)return React.createElement("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#1a0030,#0a1540)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Tajawal",padding:24,textAlign:"center"}},
    React.createElement("div",{style:{fontSize:80}},"🏆"),
    React.createElement("div",{style:{fontSize:28,fontWeight:800,color:"#ffd166",marginTop:12}},"أحسنت! 🌟"),
    React.createElement("div",{style:{fontSize:18,color:"#fff",margin:"10px 0"}},"نتيجتك: "+score+" / 100"),
    score>=80?React.createElement("div",{style:{fontSize:14,color:"#06d6a0",marginBottom:16}},"⭐ ممتاز جداً!"):score>=50?React.createElement("div",{style:{fontSize:14,color:"#ffd166",marginBottom:16}},"👍 جيد! حاول مرة ثانية"):React.createElement("div",{style:{fontSize:14,color:"#ff6b6b",marginBottom:16}},"💪 تدرّب أكثر!"),
    React.createElement("button",{onClick:onBack,style:{background:"linear-gradient(135deg,#ff9050,#ffcc00)",color:"#333",border:"none",borderRadius:14,padding:"13px 30px",fontSize:16,fontWeight:800,cursor:"pointer",marginTop:8}},"🏠 الرئيسية")
  );
  const pct=Math.round(((idx)/qs.length)*100);
  return React.createElement("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#1a0030,#0a1540)",fontFamily:"Tajawal"},className:"fade-in"},
    React.createElement("div",{style:{background:"linear-gradient(135deg,#ff9050,#ffcc00)",padding:"14px 16px 18px"}},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        React.createElement("button",{onClick:onBack,style:{background:"rgba(0,0,0,.2)",border:"none",borderRadius:10,padding:"6px 12px",color:"#fff",cursor:"pointer",fontFamily:"Tajawal",fontWeight:700,fontSize:13}},"← رجوع"),
        React.createElement("div",{style:{fontWeight:800,fontSize:15,color:"#fff"}},"🧒 ألعاب الأطفال"),
        React.createElement("div",{style:{background:"rgba(0,0,0,.2)",borderRadius:10,padding:"4px 10px",fontSize:13,fontWeight:800,color:"#fff"}},(idx+1)+"/"+qs.length)
      ),
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,color:"rgba(255,255,255,.9)",marginBottom:6}},
        React.createElement("span",null,"✅ "+score+" صح"),
        React.createElement("span",null,streak>1?"🔥 "+streak+" متتالي":""),
        React.createElement("span",null,"📊 "+pct+"%")
      ),
      React.createElement("div",{style:{height:6,background:"rgba(255,255,255,.3)",borderRadius:99,overflow:"hidden"}},
        React.createElement("div",{style:{height:"100%",width:pct+"%",background:"rgba(255,255,255,.8)",borderRadius:99,transition:"width .4s"}})
      )
    ),
    React.createElement("div",{style:{padding:"20px 16px"}},
      React.createElement("div",{style:{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.15)",borderRadius:24,padding:"28px 20px",textAlign:"center",marginBottom:20}},
        React.createElement("div",{style:{fontSize:70,marginBottom:10,filter:"drop-shadow(0 0 20px rgba(255,200,50,.5))"}},[curr.emoji]),
        React.createElement("div",{style:{fontSize:20,fontWeight:800,color:"#fff",lineHeight:1.4}},[curr.q])
      ),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
        shuffledOpts.map((opt,i)=>{
          const isCorr=opt===curr.a;
          const isSel=opt===sel;
          let bg="rgba(255,255,255,.08)";
          let border="1px solid rgba(255,255,255,.15)";
          let color="#fff";
          if(sel){if(isCorr){bg="rgba(6,214,160,.25)";border="2px solid #06d6a0";color="#06d6a0";}else if(isSel){bg="rgba(255,107,107,.2)";border="2px solid #ff6b6b";color="#ff6b6b";}}
          return React.createElement("button",{key:i,onClick:()=>pick(opt),style:{background:bg,border,borderRadius:18,padding:"16px 10px",color,fontFamily:"Tajawal",fontWeight:700,fontSize:15,cursor:"pointer",transition:"all .25s",transform:isSel?"scale(1.04)":"scale(1)"}},opt);
        })
      ),
      sel&&React.createElement("div",{style:{marginTop:16,textAlign:"center"}},
        React.createElement("div",{style:{fontSize:22,fontWeight:800,color:sel===curr.a?"#06d6a0":"#ff6b6b",marginBottom:10}},
          sel===curr.a?"✅ إجابة صحيحة! 🌟":"❌ الإجابة: "+curr.a
        ),
        React.createElement("button",{onClick:next,style:{background:"linear-gradient(135deg,#ff9050,#ffcc00)",color:"#333",border:"none",borderRadius:14,padding:"13px 40px",fontSize:16,fontWeight:800,cursor:"pointer"}},idx+1>=qs.length?"🏆 النتيجة":"التالي →")
      )
    )
  );
}

// ── System: 100 levels × 10 questions
const SQ_PER_LEVEL=10;
const SQ_TOTAL_LEVELS=100;
function sqLoadProgress(){try{const r=localStorage.getItem("wp_sq_prog");return r?JSON.parse(r):{unlocked:1,stars:{}};}catch{return{unlocked:1,stars:{}};}}
function sqSaveProgress(p){try{localStorage.setItem("wp_sq_prog",JSON.stringify(p));}catch{}}
function sqGetLevelQuestions(lvl){
  // Shuffle with seeded random per level so same level always has same questions
  function seededShuffle(arr,seed){
    const a=[...arr];let s=seed;
    for(let i=a.length-1;i>0;i--){s=(s*1103515245+12345)&0x7fffffff;const j=s%(i+1);[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }
  const total=SCRAMBLE_QUESTIONS.length;
  const shuffled=seededShuffle(SCRAMBLE_QUESTIONS,(lvl*997+137)&0x7fffffff);
  const start=((lvl-1)*SQ_PER_LEVEL)%total;
  const result=[];
  for(let i=0;i<SQ_PER_LEVEL;i++){result.push(shuffled[(start+i)%total]);}
  return result;
}

function WordScrambleGame({onBack,profile,onUpdateProfile}){
  const{C}=useTheme();
  const[progress,setProgress]=useState(()=>sqLoadProgress());
  const[screen,setScreen]=useState("levels"); // levels | playing | result
  const[currentLevel,setCurrentLevel]=useState(1);
  const[levelQuestions,setLevelQuestions]=useState([]);
  const[qIdx,setQIdx]=useState(0);
  const[score,setScore]=useState(0);
  const[currentInput,setCurrentInput]=useState([]);
  const[shakeWrong,setShakeWrong]=useState(false);
  const[winAnim,setWinAnim]=useState(false);
  const[toastMsg,setToastMsg]=useState(null);
  const[toastType,setToastType]=useState("ok");

  function toAr(n){return String(n).replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);}

  function startLevel(lvl){
    setCurrentLevel(lvl);
    setLevelQuestions(sqGetLevelQuestions(lvl));
    setQIdx(0);setScore(0);setCurrentInput([]);setWinAnim(false);setShakeWrong(false);
    setScreen("playing");
  }

  const q=levelQuestions[qIdx];

  const shuffledChars=useMemo(()=>{
    if(!q)return[];
    return [...q.a,...(q.extra||q.x||"")].sort(()=>Math.random()-.5).map((c,i)=>({c,id:i,used:false}));
  },[qIdx,currentLevel]);

  const[chars,setChars]=useState([]);
  useEffect(()=>{setChars(shuffledChars);setCurrentInput([]);setWinAnim(false);setShakeWrong(false);},[shuffledChars]);

  function selectChar(id){
    if(!q||currentInput.length>=q.a.length)return;
    const ch=chars.find(x=>x.id===id&&!x.used);
    if(!ch)return;
    setChars(prev=>prev.map(x=>x.id===id?{...x,used:true}:x));
    const ni=[...currentInput,ch];
    setCurrentInput(ni);
    if(ni.length===q.a.length){setTimeout(()=>checkAnswer(ni),100);}
  }

  function removeLastChar(){
    if(currentInput.length===0)return;
    const last=currentInput[currentInput.length-1];
    setChars(prev=>prev.map(x=>x.id===last.id?{...x,used:false}:x));
    setCurrentInput(prev=>prev.slice(0,-1));
  }

  function resetCurrent(){
    setChars(prev=>prev.map(x=>({...x,used:false})));
    setCurrentInput([]);
  }

  function checkAnswer(input){
    const ans=input.map(x=>x.c).join("");
    if(ans===q.a){
      setWinAnim(true);
      showToast("إجابة صحيحة! 🎉","ok");
      const ns=score+10;setScore(ns);
      setTimeout(()=>{
        if(qIdx+1>=levelQuestions.length){finishLevel(ns);}
        else{setQIdx(i=>i+1);}
      },900);
    } else {
      setShakeWrong(true);
      showToast("خطأ، حاول مرة أخرى ❌","err");
      setTimeout(()=>{setShakeWrong(false);resetCurrent();},700);
    }
  }

  function skipQ(){
    showToast("تم تخطي السؤال ⏭️","err");
    setTimeout(()=>{
      if(qIdx+1>=levelQuestions.length){finishLevel(score);}
      else{setQIdx(i=>i+1);}
    },300);
  }

  function finishLevel(finalScore){
    const pct=Math.round((finalScore/(SQ_PER_LEVEL*10))*100);
    const stars=pct===100?3:pct>=70?2:pct>=50?1:0;
    const newProg={...progress};
    const oldStars=newProg.stars[currentLevel]||0;
    if(stars>oldStars)newProg.stars[currentLevel]=stars;
    if(stars>=1&&currentLevel>=newProg.unlocked&&currentLevel<SQ_TOTAL_LEVELS){
      newProg.unlocked=currentLevel+1;
    }
    sqSaveProgress(newProg);
    setProgress(newProg);
    if(onUpdateProfile&&profile&&stars>=1){
      const xpE=Math.round(pct/2+(stars===3?20:0)+currentLevel);
      const coinsE=Math.round(finalScore/5+(stars===3?10:0));
      onUpdateProfile({xp:(profile.xp||0)+xpE,coins:(profile.coins||0)+coinsE});
    }
    setScore(finalScore);
    setScreen("result");
  }

  function showToast(msg,type){
    setToastMsg(msg);setToastType(type);
    setTimeout(()=>setToastMsg(null),1600);
  }

  // ── Level Select ──
  if(screen==="levels"){
    return React.createElement(ScrambleLevelSelect,{onBack,onStartLevel:startLevel,progress});
  }

  // ── Result Screen ──
  if(screen==="result"){
    const pct=Math.round((score/(SQ_PER_LEVEL*10))*100);
    const stars=pct===100?3:pct>=70?2:pct>=50?1:0;
    const theme=sqGetTheme(currentLevel);
    const passed=stars>=1;
    return React.createElement('div',{style:{minHeight:"100vh",background:theme.grad,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Tajawal",direction:"rtl",padding:24,textAlign:"center"}},
      React.createElement('div',{style:{fontSize:72,marginBottom:8}},[stars===3?"🏆":stars===2?"🌟":stars===1?"👍":"💪"]),
      React.createElement('div',{style:{fontFamily:"Baloo 2",fontSize:20,color:"#fff",marginBottom:4}},"مستوى "+toAr(currentLevel)),
      React.createElement('div',{style:{display:"flex",gap:6,justifyContent:"center",marginBottom:16}},
        [1,2,3].map(s=>React.createElement('span',{key:s,style:{fontSize:32,filter:s<=stars?"none":"grayscale(1) opacity(.25)"}},"⭐"))
      ),
      React.createElement('div',{style:{fontFamily:"Baloo 2",fontSize:52,fontWeight:800,color:"#fff",marginBottom:4}},score),
      React.createElement('div',{style:{fontSize:13,color:"rgba(255,255,255,.6)",marginBottom:24}},"من أصل "+toAr(SQ_PER_LEVEL*10)+" نقطة"),
      passed&&currentLevel<SQ_TOTAL_LEVELS&&React.createElement('button',{
        onClick:()=>startLevel(currentLevel+1),
        style:{background:"rgba(255,255,255,.95)",color:"#000",border:"none",borderRadius:50,padding:"14px 32px",fontFamily:"Tajawal",fontSize:16,fontWeight:800,cursor:"pointer",marginBottom:10,width:"100%",maxWidth:280}
      },"المستوى التالي ←"),
      React.createElement('div',{style:{display:"flex",gap:10,justifyContent:"center",width:"100%",maxWidth:280}},
        React.createElement('button',{onClick:()=>startLevel(currentLevel),style:{flex:1,background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.3)",color:"#fff",borderRadius:50,padding:"12px",fontFamily:"Tajawal",fontSize:14,fontWeight:700,cursor:"pointer"}},"🔄 أعد"),
        React.createElement('button',{onClick:()=>setScreen("levels"),style:{flex:1,background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.3)",color:"#fff",borderRadius:50,padding:"12px",fontFamily:"Tajawal",fontSize:14,fontWeight:700,cursor:"pointer"}},"🗂️ المستويات")
      )
    );
  }

  // ── Playing ──
  if(!q)return null;
  const progW=Math.round(((qIdx+1)/SQ_PER_LEVEL)*100);
  const theme=sqGetTheme(currentLevel);
  return React.createElement('div',{style:{minHeight:"100vh",background:"#080e1f",fontFamily:"Tajawal",direction:"rtl"},className:"fade-in"},
    toastMsg&&React.createElement('div',{style:{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toastType==="ok"?"#00e5a0":"#ff4d6d",color:toastType==="ok"?"#000":"#fff",padding:"12px 28px",borderRadius:50,fontWeight:700,fontSize:15,zIndex:999,whiteSpace:"nowrap",fontFamily:"Tajawal",boxShadow:"0 4px 20px rgba(0,0,0,.5)"}},toastMsg),
    // Header
    React.createElement('div',{style:{background:theme.grad,padding:"14px 16px 16px"}},
      React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        React.createElement('button',{onClick:()=>setScreen("levels"),style:{background:"rgba(255,255,255,.2)",border:"none",borderRadius:10,padding:"7px 13px",color:"#fff",cursor:"pointer",fontFamily:"Tajawal",fontSize:13}},"← رجوع"),
        React.createElement('div',{style:{fontFamily:"Baloo 2",fontWeight:800,fontSize:14,color:"#fff"}},sqGetTheme(currentLevel).icon+" مستوى "+toAr(currentLevel)),
        React.createElement('div',{style:{color:"#fff",fontWeight:700,fontSize:14}},"⭐ "+score)
      ),
      React.createElement('div',{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"rgba(255,255,255,.7)",marginBottom:8}},
        React.createElement('span',null,"سؤال "+toAr(qIdx+1)+" / "+toAr(SQ_PER_LEVEL)),
        React.createElement('span',null,sqGetTheme(currentLevel).label)
      ),
      React.createElement('div',{style:{background:"rgba(255,255,255,.2)",borderRadius:50,height:5,overflow:"hidden"}},
        React.createElement('div',{style:{height:"100%",width:progW+"%",background:"rgba(255,255,255,.85)",borderRadius:50,transition:"width .4s"}})
      )
    ),
    // Card
    React.createElement('div',{style:{margin:"16px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:28,padding:"22px 18px",boxShadow:"0 20px 50px rgba(0,0,0,.5)",position:"relative",overflow:"hidden"}},
      React.createElement('div',{style:{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#f0c040,transparent)"}}),
      React.createElement('div',{style:{fontSize:11,letterSpacing:2,color:"rgba(255,255,255,.3)",marginBottom:8,textAlign:"center"}},"رتّب الحروف للإجابة"),
      React.createElement('h2',{style:{fontSize:17,fontWeight:700,color:"#fff",textAlign:"center",lineHeight:1.5,marginBottom:22,minHeight:48}},"❓ "+q.q),
      // Slots
      React.createElement('div',{style:{display:"flex",justifyContent:"center",gap:7,flexWrap:"wrap",marginBottom:24,minHeight:56}},
        [...Array(q.a.length)].map((_,i)=>{
          const filled=i<currentInput.length;
          const letter=filled?currentInput[i].c:"";
          let bColor=winAnim&&filled?"#00e5a0":shakeWrong&&filled?"#ff4d6d":"rgba(240,192,64,.4)";
          return React.createElement('div',{
            key:i,onClick:()=>filled&&i===currentInput.length-1&&removeLastChar(),
            style:{width:46,height:52,borderBottom:"3px solid "+bColor,fontSize:24,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",color:winAnim&&filled?"#00e5a0":shakeWrong&&filled?"#ff4d6d":"#f0c040",cursor:filled&&i===currentInput.length-1?"pointer":"default",transition:"all .25s",borderRadius:"4px 4px 0 0",background:(winAnim&&filled)?"rgba(0,229,160,.08)":(shakeWrong&&filled)?"rgba(255,77,109,.08)":"transparent"}
          },letter);
        })
      ),
      // Letter buttons
      React.createElement('div',{style:{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:8,marginBottom:20}},
        chars.map(ch=>React.createElement('button',{
          key:ch.id,onClick:()=>!ch.used&&selectChar(ch.id),
          style:{width:50,height:50,background:ch.used?"transparent":"rgba(255,255,255,.07)",border:"1px solid "+(ch.used?"transparent":"rgba(240,192,64,.3)"),borderRadius:13,fontSize:20,fontWeight:700,color:ch.used?"transparent":"#fff",cursor:ch.used?"default":"pointer",transition:"all .2s",fontFamily:"Tajawal",opacity:ch.used?0:1,transform:ch.used?"scale(.4)":"scale(1)"}
        },ch.c))
      ),
      // Actions
      React.createElement('div',{style:{display:"flex",gap:8,justifyContent:"center"}},
        React.createElement('button',{onClick:resetCurrent,style:{background:"none",border:"1px solid rgba(255,77,109,.5)",color:"#ff4d6d",padding:"9px 20px",borderRadius:50,cursor:"pointer",fontFamily:"Tajawal",fontSize:13,fontWeight:700}},"🔄 إعادة"),
        React.createElement('button',{onClick:skipQ,style:{background:"none",border:"1px solid rgba(255,255,255,.12)",color:"rgba(255,255,255,.4)",padding:"9px 20px",borderRadius:50,cursor:"pointer",fontFamily:"Tajawal",fontSize:13}},"تخطي ←")
      )
    )
  );
}

function WordScrambleGame({onBack,profile,onUpdateProfile}){
  const{C}=useTheme();
  const[qIdx,setQIdx]=useState(0);
  const[score,setScore]=useState(0);
  const[currentInput,setCurrentInput]=useState([]);
  const[phase,setPhase]=useState("playing"); // playing | result
  const[shakeWrong,setShakeWrong]=useState(false);
  const[winAnim,setWinAnim]=useState(false);
  const[toastMsg,setToastMsg]=useState(null);
  const[toastType,setToastType]=useState("ok");

  const q=SCRAMBLE_QUESTIONS[qIdx];

  const shuffledChars=useMemo(()=>{
    if(!q)return[];
    return [...q.a,...q.extra].sort(()=>Math.random()-.5).map((c,i)=>({c,id:i,used:false}));
  },[qIdx]);

  const[chars,setChars]=useState(()=>shuffledChars);
  useEffect(()=>{ setChars(shuffledChars.map(x=>({...x,used:false}))); setCurrentInput([]); setWinAnim(false); setShakeWrong(false); },[qIdx]);

  function selectChar(id){
    if(currentInput.length>=q.a.length)return;
    const ch=chars.find(x=>x.id===id&&!x.used);
    if(!ch)return;
    setChars(prev=>prev.map(x=>x.id===id?{...x,used:true}:x));
    setCurrentInput(prev=>[...prev,ch]);
    if(currentInput.length+1===q.a.length){
      setTimeout(()=>check([...currentInput,ch]),100);
    }
  }

  function removeChar(slotIdx){
    if(slotIdx!==currentInput.length-1)return;
    const removed=currentInput[slotIdx];
    setChars(prev=>prev.map(x=>x.id===removed.id?{...x,used:false}:x));
    setCurrentInput(prev=>prev.slice(0,-1));
  }

  function resetCurrent(){
    setChars(prev=>prev.map(x=>({...x,used:false})));
    setCurrentInput([]);
  }

  function check(input){
    const answer=input.map(x=>x.c).join("");
    if(answer===q.a){
      setWinAnim(true);
      showToast("إجابة صحيحة! 🎉","ok");
      setScore(s=>s+10);
      setTimeout(()=>{
        if(qIdx+1>=SCRAMBLE_QUESTIONS.length){setPhase("result");}
        else{setQIdx(i=>i+1);}
      },1100);
    } else {
      setShakeWrong(true);
      showToast("خطأ، حاول مرة أخرى ❌","err");
      setTimeout(()=>{setShakeWrong(false);resetCurrent();},700);
    }
  }

  function skipQ(){
    showToast("تم تخطي السؤال ⏭️","err");
    setTimeout(()=>{
      if(qIdx+1>=SCRAMBLE_QUESTIONS.length){setPhase("result");}
      else{setQIdx(i=>i+1);}
    },400);
  }

  function showToast(msg,type){
    setToastMsg(msg);setToastType(type);
    setTimeout(()=>setToastMsg(null),1800);
  }

  function toAr(n){return String(n).replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);}

  if(phase==="result"){
    const pct=Math.round((score/(SCRAMBLE_QUESTIONS.length*10))*100);
    const rank=pct>=90?"🏅 بطل لا يُهزم!":pct>=60?"⭐ جيد جداً":"💪 تدرّب أكثر!";
    const rankColor=pct>=90?"#f0c040":pct>=60?"#4fc3f7":"rgba(255,255,255,.5)";
    if(onUpdateProfile&&profile){
      const xpE=Math.round(pct/2+10);
      onUpdateProfile({xp:(profile.xp||0)+xpE,coins:(profile.coins||0)+Math.round(score/5)});
    }
    return React.createElement('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#080e1f,#0f1a35)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Tajawal",direction:"rtl",padding:24,textAlign:"center"}},
      React.createElement('div',{style:{fontSize:68,animation:"float 2s infinite ease-in-out"}},"🏆"),
      React.createElement('div',{style:{fontFamily:"Baloo 2",fontSize:52,fontWeight:800,color:"#f0c040",margin:"12px 0 4px"}},score),
      React.createElement('div',{style:{fontSize:14,color:"rgba(255,255,255,.4)",marginBottom:16}},"نقطة من أصل "+(SCRAMBLE_QUESTIONS.length*10)),
      React.createElement('div',{style:{display:"inline-block",padding:"8px 24px",borderRadius:50,fontSize:16,fontWeight:700,color:rankColor,border:"1.5px solid "+rankColor,marginBottom:24}},rank),
      React.createElement('button',{onClick:onBack,style:{background:"linear-gradient(135deg,#c9860a,#f0c040)",color:"#000",border:"none",borderRadius:50,padding:"14px 36px",fontFamily:"Tajawal",fontSize:16,fontWeight:800,cursor:"pointer"}},
        "🏠 الرئيسية"
      )
    );
  }

  const totalQ=SCRAMBLE_QUESTIONS.length;
  const progW=Math.round(((qIdx+1)/totalQ)*100);

  return React.createElement('div',{style:{minHeight:"100vh",background:"linear-gradient(135deg,#080e1f,#0f1a35)",fontFamily:"Tajawal",direction:"rtl"},className:"fade-in"},
    // Toast
    toastMsg&&React.createElement('div',{style:{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toastType==="ok"?"#00e5a0":"#ff4d6d",color:toastType==="ok"?"#000":"#fff",padding:"12px 28px",borderRadius:50,fontWeight:700,fontSize:15,zIndex:999,whiteSpace:"nowrap",fontFamily:"Tajawal",boxShadow:"0 4px 20px rgba(0,0,0,.5)"}},toastMsg),

    // Header
    React.createElement('div',{style:{padding:"16px 16px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      React.createElement('button',{onClick:onBack,style:{background:"rgba(255,255,255,.1)",border:"none",borderRadius:10,padding:"8px 14px",color:"#fff",cursor:"pointer",fontFamily:"Tajawal",fontSize:13}},"← رجوع"),
      React.createElement('div',{style:{background:"linear-gradient(135deg,#c9860a,#f0c040)",color:"#000",fontWeight:900,fontSize:13,padding:"6px 14px",borderRadius:50}},
        "سؤال "+toAr(qIdx+1)+" / "+toAr(totalQ)
      ),
      React.createElement('div',{style:{color:"#f0c040",fontWeight:700,fontSize:16}},"⭐ "+score)
    ),

    // Progress
    React.createElement('div',{style:{margin:"12px 16px 0",background:"rgba(255,255,255,.08)",borderRadius:50,height:6,overflow:"hidden"}},
      React.createElement('div',{style:{height:"100%",width:progW+"%",background:"linear-gradient(90deg,#4fc3f7,#f0c040)",borderRadius:50,transition:"width .5s"}})
    ),

    // Game card
    React.createElement('div',{style:{margin:"16px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:28,padding:"24px 20px",boxShadow:"0 25px 60px rgba(0,0,0,.5)",position:"relative",overflow:"hidden"}},
      // top gold line
      React.createElement('div',{style:{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#f0c040,transparent)"}}),

      React.createElement('div',{style:{fontSize:11,letterSpacing:2,color:"rgba(255,255,255,.35)",marginBottom:10,textAlign:"center"}},"رتّب الحروف للإجابة"),
      React.createElement('h2',{style:{fontSize:18,fontWeight:700,color:"#fff",textAlign:"center",lineHeight:1.5,marginBottom:24,minHeight:54}},"❓ "+q.q),

      // Answer slots
      React.createElement('div',{style:{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",marginBottom:28,minHeight:60}},
        [...Array(q.a.length)].map((_,i)=>{
          const filled=i<currentInput.length;
          const letter=filled?currentInput[i].c:"";
          let border="3px solid rgba(240,192,64,.35)";
          let bg="transparent";
          let color="#f0c040";
          if(winAnim&&filled){border="3px solid #00e5a0";color="#00e5a0";bg="rgba(0,229,160,.08)";}
          if(shakeWrong&&filled){border="3px solid #ff4d6d";color="#ff4d6d";}
          return React.createElement('div',{
            key:i,
            onClick:()=>filled&&removeChar(i),
            style:{width:48,height:54,borderBottom:border,borderTop:"none",borderLeft:"none",borderRight:"none",fontSize:26,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",color,background:bg,borderRadius:"4px 4px 0 0",cursor:filled?"pointer":"default",transition:"all .25s",animation:winAnim&&filled?"bounce .4s ease":shakeWrong&&filled?"shake .4s ease":"none"}
          },letter);
        })
      ),

      // Letters grid
      React.createElement('div',{style:{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:10,marginBottom:24}},
        chars.map(ch=>React.createElement('button',{
          key:ch.id,
          onClick:()=>!ch.used&&selectChar(ch.id),
          style:{width:52,height:52,background:ch.used?"transparent":"rgba(255,255,255,.07)",border:"1px solid "+(ch.used?"transparent":"rgba(240,192,64,.35)"),borderRadius:14,fontSize:22,fontWeight:700,color:ch.used?"transparent":"#fff",cursor:ch.used?"default":"pointer",transition:"all .2s",fontFamily:"Tajawal",opacity:ch.used?0:1,transform:ch.used?"scale(.5) translateY(-10px)":"scale(1)"}
        },ch.c))
      ),

      // Actions
      React.createElement('div',{style:{display:"flex",gap:10,justifyContent:"center"}},
        React.createElement('button',{onClick:resetCurrent,style:{background:"none",border:"1px solid rgba(255,77,109,.5)",color:"#ff4d6d",padding:"10px 22px",borderRadius:50,cursor:"pointer",fontFamily:"Tajawal",fontSize:14,fontWeight:700}},"🔄 إعادة"),
        React.createElement('button',{onClick:skipQ,style:{background:"none",border:"1px solid rgba(255,255,255,.15)",color:"rgba(255,255,255,.5)",padding:"10px 22px",borderRadius:50,cursor:"pointer",fontFamily:"Tajawal",fontSize:14,fontWeight:700}},"تخطي ←")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(App)
);
</script>

<script>
// Generate splash stars
(function(){
  const container=document.getElementById('spStars');
  if(!container)return;
  for(let i=0;i<80;i++){
    const el=document.createElement('div');
    el.className='sp-star';
    const size=0.5+Math.random()*2.5;
    el.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${1.5+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    container.appendChild(el);
  }
  // Loading percentage counter
  const pct=document.getElementById('spPct');
  if(pct){let p=0;const t=setInterval(()=>{p=Math.min(100,p+Math.floor(Math.random()*8)+2);pct.textContent=p+'%';if(p>=100)clearInterval(t);},80);}
})();

const _obs=new MutationObserver(()=>{
  if(document.getElementById('root').children.length>0){
    setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),800);}},600);
    _obs.disconnect();
  }
});
_obs.observe(document.getElementById('root'),{childList:true,subtree:true});
setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),800);}},8000);
</script>

window._fbConnected = function(response) {

      document.getElementById('fb-welcome').textContent = 'أهلاً، ' + u.name + ' 👋';

      // Store user info globally
      window._fbUserName = u.name;
      window._fbUserPhoto = u.picture.data.url;

function fbLogin() {
  FB.login(function(r) {

}

}

}

    }
  }
}, 200);
